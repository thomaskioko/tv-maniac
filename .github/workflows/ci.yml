name: build

on:
    push:
        branches: [ main ]
    pull_request:
        types: [ opened, synchronize ]
    workflow_call:

concurrency:
    group: ci-${{ github.ref }}-${{ github.head_ref }}-${{ github.workflow }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
    XCODE_VERSION: 26.5
    TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
    TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
    TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
    TRAKT_REDIRECT_URI: ${{ secrets.TRAKT_REDIRECT_URI }}
    SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
    SIMKL_CLIENT_SECRET: ${{ secrets.SIMKL_CLIENT_SECRET }}
    SIMKL_REDIRECT_URI: ${{ secrets.SIMKL_REDIRECT_URI }}

jobs:
    spotless:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v7

            -   name: 🐘 Setup Gradle Environment
                uses: ./.github/actions/setup-gradle

            -   name: Run Spotless
                run: ./gradlew spotlessCheck -Papp.debugOnly=false

    lint:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v7

            -   name: 🐘 Setup Gradle Environment
                uses: ./.github/actions/setup-gradle

            -   name: Lint Project
                run: ./gradlew :app:lintRelease -Papp.debugOnly=false

            -   name: Upload Lint Report
                if: ${{ !cancelled() }}
                uses: actions/upload-artifact@v7
                with:
                    name: android-lint-report
                    path: build/reports/lint/
                    if-no-files-found: ignore

    dependency-health:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v7

            -   name: 🐘 Setup Gradle Environment
                uses: ./.github/actions/setup-gradle

            -   name: Dependency Health
                run: ./gradlew buildHealth -Papp.debugOnly=false

            -   name: Upload Dependency Health Report
                if: ${{ !cancelled() }}
                uses: actions/upload-artifact@v7
                with:
                    name: dependency-health-report
                    path: '**/build/reports/dependency-analysis/build-health-report.txt'

    module-graph:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            -   uses: actions/checkout@v7
                with:
                    token: ${{ secrets.GH_COMMIT_PAT || github.token }}
                    persist-credentials: true

            -   name: 🐘 Setup Gradle Environment
                uses: ./.github/actions/setup-gradle

            -   name: Update Module Graphs
                run: ./gradlew graphUpdate

            -   name: Check Module Graphs
                id: graphs_verify
                continue-on-error: true
                run: git add -- '**/README.md' && git diff --cached --quiet --exit-code -- '**/README.md'

            -   name: Fail on stale graphs (no auto-commit available)
                if: steps.graphs_verify.outcome == 'failure' && github.event.pull_request.head.repo.full_name != github.repository
                run: |
                    echo "::error::Module graphs are stale. Run ./gradlew graphUpdate and commit the updated README.md files." && exit 1

            -   name: Commit refreshed graphs
                if: steps.graphs_verify.outcome == 'failure' && github.event_name == 'pull_request'
                uses: stefanzweifel/git-auto-commit-action@v7
                with:
                    file_pattern: '**/README.md'
                    disable_globbing: true
                    commit_message: "🤖 Update module graphs"

    dependency-guard:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            -   uses: actions/checkout@v7
                with:
                    token: ${{ secrets.GH_COMMIT_PAT || github.token }}
                    persist-credentials: true

            -   name: 🐘 Setup Gradle Environment
                uses: ./.github/actions/setup-gradle

            -   name: Update Dependency Guard Baselines
                run: ./gradlew :app:dependencyGuardBaseline :ios-framework:dependencyGuardBaseline -Papp.debugOnly=false

            -   name: Check Dependency Guard Baselines
                id: guard_verify
                continue-on-error: true
                run: git add -- '**/dependencies/*.txt' && git diff --cached --quiet --exit-code -- '**/dependencies/*.txt'

            -   name: Fail on stale baselines (no auto-commit available)
                if: steps.guard_verify.outcome == 'failure' && github.event.pull_request.head.repo.full_name != github.repository
                run: |
                    echo "::error::Dependency guard baselines are stale. Run ./gradlew dependencyGuardBaseline and commit the updated dependencies/*.txt files." && exit 1

            -   name: Commit refreshed baselines
                if: steps.guard_verify.outcome == 'failure' && github.event_name == 'pull_request'
                uses: stefanzweifel/git-auto-commit-action@v7
                with:
                    file_pattern: '**/dependencies/*.txt'
                    disable_globbing: true
                    commit_message: "🤖 Update dependency guard baselines"

    swift-lint:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v7

            -   name: 🔍 Run SwiftLint (pinned)
                uses: docker://ghcr.io/realm/swiftlint:0.64.1
                with:
                    args: --config .swiftlint.yml

    build-android:
        runs-on: ubuntu-latest
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        steps:
            -   name: 🚚 Checkout Code
                uses: actions/checkout@v7

            -   name: 🐘 Setup Gradle Environment
                uses: ./.github/actions/setup-gradle

            -   name: 🔥 Install google-services.json
                env:
                    GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
                run: |
                    if [ -n "$GOOGLE_SERVICES_JSON" ]; then
                      echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json
                    else
                      echo "warning: GOOGLE_SERVICES_JSON secret not set — Firebase will be disabled"
                    fi

            -   name: 🤖 Build Android App
                env:
                    BUNDLE_TASK: ${{ github.ref == 'refs/heads/main' && ':app:bundleRelease' || '' }}
                run: |
                    ./gradlew :app:assembleRelease $BUNDLE_TASK \
                      -Pandroidx.baselineprofile.skipgeneration=true \
                      -Pcompose.enableCompilerMetrics=true \
                      -Pcompose.enableCompilerReports=true \
                      -Papp.debugOnly=false

            -   name: Upload Compose Compiler Metrics
                if: ${{ !cancelled() }}
                uses: actions/upload-artifact@v7
                with:
                    name: compose-compiler-metrics
                    path: |
                        **/build/compose-metrics/
                        **/build/compose-reports/



    linux-test:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v7

            -   name: 🐘 Setup Gradle Environment
                uses: ./.github/actions/setup-gradle

            -   name: Run Linux Tests
                run: ./gradlew linuxTest -Papp.debugOnly=false

            -   name: Upload Test Reports
                uses: actions/upload-artifact@v7
                if: ${{ !cancelled() }}
                with:
                    name: linux-test-report
                    path: '**/build/reports/*'

