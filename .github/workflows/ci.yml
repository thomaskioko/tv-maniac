    build-ios-framework:
        needs: [swift-lint]
        runs-on: macos-26
        timeout-minutes: 60
        env:
            FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 60

        steps:
            -   name: 🚚 Checkout project
                uses: actions/checkout@v7

            -   name: 📱 Setup iOS Environment
                uses: ./.github/actions/setup-ios
                with:
                    xcode-version: ${{ env.XCODE_VERSION }}
                    gradle-cache-read-only: 'false'

            -   name: 🧱 Build & cache KMP frameworks
                uses: ./.github/actions/kmp-ios-framework
                with:
                    mode: build

    build-ios:
        needs: [build-ios-framework]
        runs-on: macos-26
        timeout-minutes: 60
        env:
            FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 60
            TVMANIAC_SKIP_FRAMEWORK_BUILD: '1'

        steps:
            -   name: 🚚 Checkout project
                uses: actions/checkout@v7

            -   name: 📱 Setup iOS Environment
                uses: ./.github/actions/setup-ios
                with:
                    xcode-version: ${{ env.XCODE_VERSION }}

            -   name: 🗂️ Restore prebuilt KMP frameworks
                uses: ./.github/actions/kmp-ios-framework
                with:
                    mode: restore

            -   name: 🔥 Install GoogleService-Info.plist
                env:
                    GOOGLE_SERVICE_INFO: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
                run: |
                    if [ -n "$GOOGLE_SERVICE_INFO" ]; then
                      mkdir -p ios/ios/Firebase/Debug
                      echo "$GOOGLE_SERVICE_INFO" | base64 --decode > ios/ios/Firebase/Debug/GoogleService-Info.plist
                    else
                      echo "warning: GOOGLE_SERVICE_INFO_PLIST secret not set — Firebase will be disabled"
                    fi

            -   name: 🧱 Build iOS App
                run: bundle exec fastlane build_tvmaniac

            -   name: Upload build artifacts
                uses: actions/upload-artifact@v7
                if: ${{ !cancelled() }}
                with:
                    name: ios-build
                    path: |
                        derived_data/Build/Products/
                        fastlane/logs
                        !derived_data/Build/Products/**/*.bundle/**


    ios-snapshot-test:
        needs: [build-ios-framework]
        runs-on: macos-26
        timeout-minutes: 60
        env:
            FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 60
            TVMANIAC_SKIP_FRAMEWORK_BUILD: '1'

        steps:
            -   name: 🚚 Checkout project
                uses: actions/checkout@v7

            -   name: 📱 Setup iOS Environment
                uses: ./.github/actions/setup-ios
                with:
                    xcode-version: ${{ env.XCODE_VERSION }}

            -   name: 🗂️ Restore prebuilt KMP frameworks
                uses: ./.github/actions/kmp-ios-framework
                with:
                    mode: restore

            -   name: 🗂️ Restore DerivedData
                id: derived-data
                uses: actions/cache/restore@v6
                with:
                    path: derived_data
                    key: ${{ runner.os }}-snapshot-derived-data-${{ hashFiles('ios/tv-maniac.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'ios/Packages/**/Package.swift') }}
                    restore-keys: |
                        ${{ runner.os }}-snapshot-derived-data-

            -   name: 📸 Run Snapshot Tests
                run: bundle exec fastlane snapshot_tests

            -   name: 🗂️ Save DerivedData
                if: github.ref == 'refs/heads/main' && steps.derived-data.outputs.cache-hit != 'true'
                uses: actions/cache/save@v6
                with:
                    path: derived_data
                    key: ${{ runner.os }}-snapshot-derived-data-${{ hashFiles('ios/tv-maniac.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'ios/Packages/**/Package.swift') }}

            -   name: Upload test results
                uses: actions/upload-artifact@v7
                if: ${{ !cancelled() }}
                with:
                    name: snapshot-test-results
                    path: |
                        fastlane/test_output
                        fastlane/logs
                        derived_data/Logs/Test
