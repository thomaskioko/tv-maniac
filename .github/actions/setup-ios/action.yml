name: 'Setup iOS Environment'
description: 'Common setup for iOS builds with Xcode, Ruby, SPM cache, and Gradle'

inputs:
  xcode-version:
    description: 'Xcode version to use'
    required: true
  spm-cache-path:
    description: 'Path to SPM dependencies for caching'
    required: false
    default: 'ios/SourcePackages'
  gradle-cache-read-only:
    description: 'Forwarded to setup-gradle. Defaults to read-only on pull requests; set false for the cache-writing job.'
    required: false
    default: ${{ github.event_name == 'pull_request' }}

runs:
  using: 'composite'
  steps:
    - name: 📀 Setup Xcode version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ inputs.xcode-version }}

    - name: 📱 Verify Simulator Availability
      shell: bash
      run: |
        echo "Xcode: $(xcodebuild -version | head -1)"
        echo "Available iOS runtimes:"
        xcrun simctl list runtimes iOS
        echo "Available iPhone simulators:"
        xcrun simctl list devices available iPhone

    - name: 💎 Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        bundler-cache: true

    - name: Cache SPM dependencies
      uses: actions/cache@v6
      with:
        path: ${{ inputs.spm-cache-path }}
        key: ${{ runner.os }}-spm-${{ hashFiles('ios/tv-maniac.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-

    - name: 🍺 Install Brewfile dependencies
      shell: bash
      run: brew bundle check --no-upgrade || brew bundle install --no-upgrade

    - name: Cache Mint packages
      uses: actions/cache@v6
      with:
        path: ~/.mint
        key: ${{ runner.os }}-mint-${{ hashFiles('Mintfile') }}
        restore-keys: |
          ${{ runner.os }}-mint-

    - name: 🌱 Bootstrap Mint
      shell: bash
      run: mint bootstrap --link

    - name: 🗂️ Cache Kotlin/Native (konan)
      uses: actions/cache@v6
      with:
        path: ~/.konan
        key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}
        restore-keys: |
          ${{ runner.os }}-konan-

    - name: 🐘 Setup Gradle
      uses: ./.github/actions/setup-gradle
      with:
        gradle-cache-read-only: ${{ inputs.gradle-cache-read-only }}
