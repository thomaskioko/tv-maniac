name: 'KMP iOS Framework'
description: 'Resolve the simulator SDK and either build-and-cache (mode=build) or restore (mode=restore) the TvManiac XCFramework the iOS app and packages resolve via SwiftPM.'

inputs:
  mode:
    description: 'build = build the XCFramework on a cache miss and cache it (producer job); restore = restore-only for consumer jobs.'
    required: true

outputs:
  sdk-name:
    description: 'Resolved simulator SDK name, e.g. iphonesimulator26.5.'
    value: ${{ steps.sdk.outputs.sdk_name }}

runs:
  using: 'composite'
  steps:
    - name: 🧮 Resolve simulator SDK name
      id: sdk
      shell: bash
      run: echo "sdk_name=iphonesimulator$(xcrun --sdk iphonesimulator --show-sdk-version)" >> "$GITHUB_OUTPUT"

    - name: 🗂️ Cache KMP XCFramework
      id: cache-build
      if: inputs.mode == 'build'
      uses: actions/cache@v6
      with:
        path: ios/Packages/TvManiacFramework/Frameworks
        key: ${{ runner.os }}-xcframework-${{ steps.sdk.outputs.sdk_name }}-${{ hashFiles('**/*.kt', '**/*.kts', 'gradle/libs.versions.toml', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}

    - name: 🗂️ Restore prebuilt KMP XCFramework
      if: inputs.mode == 'restore'
      uses: actions/cache/restore@v6
      with:
        path: ios/Packages/TvManiacFramework/Frameworks
        key: ${{ runner.os }}-xcframework-${{ steps.sdk.outputs.sdk_name }}-${{ hashFiles('**/*.kt', '**/*.kts', 'gradle/libs.versions.toml', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}

    # Builds the XCFramework into ios/Packages/TvManiacFramework/Frameworks,
    # the directory the TvManiacFramework package's binaryTarget points at.
    # Consumer jobs restore this directory and set TVMANIAC_SKIP_FRAMEWORK_BUILD=1
    # so the scheme pre-action skips the gradle build. Only on a cache miss.
    - name: 🧱 Assemble KMP XCFramework
      if: inputs.mode == 'build' && steps.cache-build.outputs.cache-hit != 'true'
      shell: bash
      run: ./scripts/build-kmp-framework.sh --configuration debug --platform simulator

    - name: ✅ Verify built framework
      if: inputs.mode == 'build'
      shell: bash
      run: test -f "ios/Packages/TvManiacFramework/Frameworks/TvManiac.xcframework/ios-arm64-simulator/TvManiac.framework/TvManiac"
