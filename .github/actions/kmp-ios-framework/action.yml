name: 'KMP iOS Framework'
description: 'Resolve the simulator SDK and either build-and-cache (mode=build) or restore (mode=restore) the TvManiac + i18n frameworks the iOS app and snapshot schemes link against.'

inputs:
  mode:
    description: 'build = link the framework on a cache miss and cache it (producer job); restore = restore-only for consumer jobs.'
    required: true

outputs:
  sdk-name:
    description: 'Resolved simulator SDK name, e.g. iphonesimulator18.5.'
    value: ${{ steps.sdk.outputs.sdk_name }}

runs:
  using: 'composite'
  steps:
    - name: 🧮 Resolve simulator SDK name
      id: sdk
      shell: bash
      run: echo "sdk_name=iphonesimulator$(xcrun --sdk iphonesimulator --show-sdk-version)" >> "$GITHUB_OUTPUT"

    - name: 🗂️ Cache KMP frameworks
      id: cache-build
      if: inputs.mode == 'build'
      uses: actions/cache@v6
      with:
        path: |
          ios-framework/build/xcode-frameworks
          i18n/generator/build/xcode-frameworks
        key: ${{ runner.os }}-xcframework-${{ steps.sdk.outputs.sdk_name }}-${{ hashFiles('**/*.kt', '**/*.kts', 'gradle/libs.versions.toml', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}

    - name: 🗂️ Restore prebuilt KMP frameworks
      if: inputs.mode == 'restore'
      uses: actions/cache/restore@v6
      with:
        path: |
          ios-framework/build/xcode-frameworks
          i18n/generator/build/xcode-frameworks
        key: ${{ runner.os }}-xcframework-${{ steps.sdk.outputs.sdk_name }}-${{ hashFiles('**/*.kt', '**/*.kts', 'gradle/libs.versions.toml', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}

    # Static framework (isStatic = true): consumers link it in via FRAMEWORK_SEARCH_PATHS, so the
    # scheme pre-action can be skipped once this stage is populated. Runs the same embedAndSign task
    # the schemes run, with Xcode's env vars supplied manually (the task is a no-op without them).
    # Only on a cache miss.
    - name: 🧱 Assemble KMP frameworks
      if: inputs.mode == 'build' && steps.cache-build.outputs.cache-hit != 'true'
      shell: bash
      env:
        CONFIGURATION: Debug
        SDK_NAME: ${{ steps.sdk.outputs.sdk_name }}
        ARCHS: arm64
        ENABLE_USER_SCRIPT_SANDBOXING: 'NO'
      run: |
        export TARGET_BUILD_DIR="$RUNNER_TEMP/stage"
        export BUILT_PRODUCTS_DIR="$RUNNER_TEMP/stage"
        export FRAMEWORKS_FOLDER_PATH="Frameworks"
        mkdir -p "$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH"
        ./gradlew \
          :ios-framework:embedAndSignAppleFrameworkForXcode \
          :i18n:generator:embedAndSignAppleFrameworkForXcode \
          -Papp.enableIos=true

    - name: ✅ Verify staged frameworks
      if: inputs.mode == 'build'
      shell: bash
      run: |
        test -f "ios-framework/build/xcode-frameworks/Debug/${{ steps.sdk.outputs.sdk_name }}/TvManiac.framework/TvManiac"
        test -f "i18n/generator/build/xcode-frameworks/Debug/${{ steps.sdk.outputs.sdk_name }}/i18n.framework/i18n"
